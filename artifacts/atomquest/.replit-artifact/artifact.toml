kind = "web"
previewPath = "/"
title = "AtomQuest Goal Portal"
version = "1.0.0"
id = "artifacts/atomquest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18913

[services.development]
run = "pnpm --filter @workspace/atomquest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atomquest", "run", "build" ]
publicDir = "artifacts/atomquest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18913"
BASE_PATH = "/"
